<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Scadenzario</title>
<meta name="description" content="Tieni traccia di cosa hai in frigo, freezer e dispensa">
<meta name="theme-color" content="#C87456">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<link rel="icon" href="assets/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Scadenzario">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div class="topbar" id="topbar">
    <h1>Scadenzario</h1>
    <div class="sub" id="subtitle">Cosa c'è in casa</div>
    <div class="search-row">
      <div class="search-box">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Cerca un alimento…">
      </div>
    </div>
    <div id="offlinePill" class="offline-pill" style="display:none;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
      Sei offline — i dati restano salvati sul telefono
    </div>
  </div>

  <!-- Category chips -->
  <div class="chip-row" id="chipRow"></div>

  <!-- List -->
  <div class="list" id="list"></div>

  <!-- FAB -->
  <div class="fab-row">
    <div class="fab-wrap">
      <button class="fab" id="fabAdd" aria-label="Aggiungi alimento">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- Add / edit item sheet -->
  <div class="sheet-backdrop" id="itemBackdrop">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h2 class="sheet-title" id="itemSheetTitle">Nuovo alimento</h2>

      <div class="scan-row">
        <button class="btn btn-secondary btn-block" id="scanBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
          Scansiona codice a barre
        </button>
      </div>

      <div id="productHint" style="display:none;" class="product-hint"></div>

      <div class="field">
        <label for="itemName">Nome alimento</label>
        <input type="text" id="itemName" placeholder="Es. Latte fresco intero">
      </div>

      <div class="row-2">
        <div class="field">
          <label for="itemCategory">Categoria</label>
          <select id="itemCategory"></select>
        </div>
        <div class="field">
          <label for="itemQty">Quantità</label>
          <input type="text" id="itemQty" placeholder="Es. 1 confezione">
        </div>
      </div>

      <div class="field">
        <label>Tipo di scadenza</label>
        <div class="segmented" id="dateTypeSeg">
          <button type="button" data-val="entro" class="active">Da consumarsi entro</button>
          <button type="button" data-val="preferibilmente">Preferibilmente entro</button>
        </div>
      </div>

      <div class="field">
        <label for="itemDate">Data</label>
        <input type="date" id="itemDate">
      </div>

      <div class="field">
        <label for="itemNotes">Note (opzionale)</label>
        <textarea id="itemNotes" placeholder="Es. aperto il 3/7, congelare entro…"></textarea>
      </div>

      <input type="hidden" id="itemId">
      <input type="hidden" id="itemBarcode">

      <button class="btn btn-primary" id="saveItemBtn">Salva</button>
      <div class="actions-row">
        <button class="btn btn-danger btn-block" id="deleteItemBtn" style="display:none;">Elimina alimento</button>
      </div>
    </div>
  </div>

  <!-- Category manager sheet -->
  <div class="sheet-backdrop" id="catBackdrop">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h2 class="sheet-title">Categorie</h2>
      <div id="catList"></div>
      <div class="scan-row" style="margin-top:14px;">
        <input type="text" id="newCatName" placeholder="Nuova categoria…" style="flex:1; border:1px solid var(--line); border-radius:10px; padding:11px 12px; font-family:'DM Sans'; font-size:15px;">
        <button class="btn btn-primary" id="addCatBtn" style="width:auto; padding:12px 18px;">Aggiungi</button>
      </div>
    </div>
  </div>

  <!-- Scanner -->
  <div class="scanner-view" id="scannerView" style="display:none;">
    <div class="scanner-top">
      <button class="scanner-close" id="scannerClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="label">Inquadra il codice a barre</div>
      <button class="scanner-close" id="scannerTorch" style="display:none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M9 18h6M10 22h4M15 2H9l-1 8h2l-1 8 6-10h-3l2-6z"/></svg>
      </button>
    </div>
    <video id="scannerVideo" autoplay muted playsinline></video>
    <div class="scanner-frame"></div>
    <button class="scanner-shutter" id="scannerShutter" aria-label="Scatta e leggi">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--terracotta)" stroke-width="2.2"><circle cx="12" cy="12" r="9"/></svg>
    </button>
    <div class="scanner-status" id="scannerStatus">Cerco il codice…</div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script src="assets/zxing.min.js"></script>
<script src="assets/supabase.min.js"></script>
<script src="app.js"></script>
</body>
</html>
